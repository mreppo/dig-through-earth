name: i18n parity check

# Runs on every PR to main and every push to main. The check is required by
# branch protection, so it must fire on every PR regardless of which files
# changed - otherwise a PR that doesn't touch i18n/** would sit forever
# waiting for a check that never starts.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run i18n parity check
        run: python3 scripts/check-i18n.py
