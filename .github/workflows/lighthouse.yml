name: Lighthouse a11y

# Push trigger registers the check context against `main`, which is what
# branch protection looks for when matching `required_status_checks.contexts`.
# Pull-request trigger gates the merge itself.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Serve the static site
        run: python3 -m http.server 8080 &
      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8080/ > /dev/null; then exit 0; fi
            sleep 0.5
          done
          echo "server never came up" >&2
          exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false
